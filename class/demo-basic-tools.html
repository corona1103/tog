<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基础工具 - 三端联动 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #1a1a2e;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  text-align: center;
  padding: 10px 20px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.header h1 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.tab-btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s;
}

.tab-btn:hover {
  border-color: #4fc3f7;
  color: #4fc3f7;
}

.tab-btn.active {
  background: #4fc3f7;
  border-color: #4fc3f7;
  color: #fff;
  font-weight: 600;
}

/* Layout - big screen left, tablets stacked right */
.main-container {
  max-width: 1800px;
  margin: 0 auto;
  padding: 12px 20px;
  display: grid;
  grid-template-columns: 1fr 520px;
  grid-template-rows: 1fr 1fr;
  gap: 12px 20px;
  height: calc(100vh - 110px);
}

/* Big Screen */
.bigscreen-section {
  display: flex;
  flex-direction: column;
  grid-row: 1 / 3;
}

.device-label {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
  font-weight: 500;
}

.bigscreen-device {
  width: 100%;
  flex: 1;
  background: #e8f4fd;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 16px 50px rgba(0,0,0,0.5);
  position: relative;
  border: 3px solid #333;
}

.bigscreen-device .screen-content {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
}

/* Big screen - courseware area */
.bs-courseware {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: #f0f7ff;
}

.bs-courseware .question-text {
  font-size: 14px;
  color: #333;
  text-align: center;
  line-height: 1.6;
}

/* Big screen - right toolbar */
.bs-toolbar {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  background: #2d2d3d;
  border-radius: 24px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 30;
}

.bs-toolbar .tool-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #aaa;
  cursor: pointer;
  transition: all 0.2s;
}

.bs-toolbar .tool-icon.active {
  background: #4fc3f7;
  color: #fff;
}

/* Big screen - launch button */
.bs-launch-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  margin-top: -80px;
  background: #00bcd4;
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,188,212,0.4);
  transition: all 0.2s;
  z-index: 10;
}

.bs-launch-btn:hover {
  transform: translateY(-50%) scale(1.05);
  margin-top: -80px;
}

.bs-launch-btn .new-tag {
  position: absolute;
  top: -8px;
  right: -8px;
  background: #ff5252;
  color: #fff;
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 8px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Big screen - bottom bar */
.bs-bottom-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: #1e1e2e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  font-size: 11px;
  color: #aaa;
}

.bs-bottom-bar .left-controls,
.bs-bottom-bar .right-controls {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* Big screen - interaction overlay (选择题) */
.bs-interaction-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: rgba(30,30,46,0.95);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  font-size: 13px;
  z-index: 20;
}

.bs-interaction-bar .label {
  color: #4fc3f7;
  font-weight: 600;
}

.bs-interaction-bar .timer {
  color: #ff6b35;
  font-weight: 700;
  font-size: 16px;
}

.bs-interaction-bar .count {
  color: #aaa;
}

/* Big screen - result panel */
.bs-result-panel {
  background: rgba(30,30,46,0.95);
  border-radius: 12px;
  padding: 18px 22px;
  width: 380px;
  max-height: calc(100% - 70px);
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.bs-result-panel h3 {
  font-size: 14px;
  margin-bottom: 12px;
  color: #4fc3f7;
}

.result-bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result-bar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}

.result-bar-item .option-label {
  width: 20px;
  font-weight: 600;
}

.result-bar-item .bar {
  flex: 1;
  height: 20px;
  background: #333;
  border-radius: 10px;
  overflow: hidden;
}

.result-bar-item .bar-fill {
  height: 100%;
  background: #4fc3f7;
  border-radius: 10px;
  transition: width 0.5s ease;
}

.result-bar-item .bar-fill.correct {
  background: #66bb6a;
}

.result-bar-item .pct {
  width: 36px;
  text-align: right;
  font-size: 12px;
  color: #aaa;
}

/* Big screen - quiz overlay */
.bs-quiz-overlay {
  position: absolute;
  inset: 5% 8%;
  background: rgba(30,32,40,0.97);
  border-radius: 16px;
  z-index: 20;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  color: #fff;
  overflow: hidden;
}

.bs-quiz-overlay .quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.bs-quiz-overlay .quiz-header h3 {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
}

.bs-quiz-overlay .quiz-close-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bs-quiz-overlay .quiz-top-stats {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}

.bs-quiz-overlay .quiz-stat-box {
  flex: 1;
  background: rgba(40,44,55,0.9);
  border-radius: 10px;
  padding: 10px 14px;
}

.bs-quiz-overlay .quiz-stat-box .stat-label {
  font-size: 11px;
  color: #888;
  margin-bottom: 6px;
}

.bs-quiz-overlay .quiz-stat-box .stat-value {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 2px;
}

.bs-quiz-overlay .quiz-stat-box .stat-row {
  display: flex;
  gap: 20px;
  align-items: baseline;
}

.bs-quiz-overlay .quiz-stat-box .stat-num {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
}

.bs-quiz-overlay .quiz-stat-box .stat-num small {
  font-size: 14px;
  font-weight: 400;
  color: #888;
}

.bs-quiz-overlay .quiz-stat-box .stat-sub {
  font-size: 10px;
  color: #666;
  margin-top: 2px;
}

.bs-quiz-overlay .quiz-tabs {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 12px;
}

.bs-quiz-overlay .quiz-tab {
  font-size: 13px;
  color: #888;
  cursor: pointer;
  padding-bottom: 4px;
  border-bottom: 2px solid transparent;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.bs-quiz-overlay .quiz-tab.active {
  color: #4fc3f7;
  border-bottom-color: #4fc3f7;
}

.bs-quiz-overlay .quiz-body {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}

/* Student data grid */
.quiz-student-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.quiz-student-card {
  background: rgba(50,54,65,0.8);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.quiz-student-card .card-top {
  display: flex;
  align-items: center;
  gap: 6px;
}

.quiz-student-card .card-name {
  font-size: 12px;
  color: #fff;
  font-weight: 500;
}

.quiz-student-card .card-tag {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #2e7d32;
  color: #a5d6a7;
}

.quiz-student-card .card-tag.pending {
  background: transparent;
  color: transparent;
}

.quiz-student-card .card-stats {
  display: flex;
  gap: 8px;
  font-size: 9px;
  color: #888;
}

.quiz-student-card .card-stats .val {
  color: #ccc;
}

/* Question data layout */
.quiz-question-layout {
  display: flex;
  gap: 14px;
  height: 100%;
}

/* Left: horizontal bar chart */
.quiz-barchart {
  width: 200px;
  min-width: 200px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.quiz-barchart-title {
  font-size: 10px;
  color: #888;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.quiz-bars-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow-y: auto;
  padding-right: 4px;
}

.quiz-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  transition: background 0.2s;
}

.quiz-bar-row:hover {
  background: rgba(255,255,255,0.04);
}

.quiz-bar-row.selected {
  background: rgba(79,195,247,0.1);
}

.quiz-bar-label {
  font-size: 10px;
  color: #888;
  white-space: nowrap;
  width: 36px;
  flex-shrink: 0;
}

.quiz-bar-row.selected .quiz-bar-label {
  color: #4fc3f7;
  font-weight: 600;
}

.quiz-bar-track {
  flex: 1;
  height: 14px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-bar {
  height: 100%;
  border-radius: 3px;
  transition: all 0.3s;
  min-width: 2px;
  opacity: 0.55;
}

.quiz-bar-row.selected .quiz-bar,
.hw-bar-row.selected .quiz-bar {
  opacity: 1;
}

.quiz-bar-row:hover .quiz-bar,
.hw-bar-row:hover .quiz-bar {
  opacity: 0.8;
}

.quiz-bar-pct {
  font-size: 9px;
  color: #aaa;
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

.quiz-bar-row.selected .quiz-bar-pct {
  font-weight: 600;
}

/* Right: question detail */
.quiz-question-detail {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.quiz-q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.quiz-q-num {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
}

.quiz-fullscreen-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(79,195,247,0.5);
  background: rgba(79,195,247,0.1);
  color: #4fc3f7;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.quiz-fullscreen-btn:hover {
  background: rgba(79,195,247,0.25);
}

.quiz-q-content {
  background: rgba(50,54,65,0.6);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #ddd;
  line-height: 1.6;
}

.quiz-detail-section {
  margin-bottom: 6px;
}

.quiz-detail-section .section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.quiz-detail-section .section-title {
  font-size: 11px;
  font-weight: 500;
}

.quiz-detail-section .section-title.correct { color: #66bb6a; }
.quiz-detail-section .section-title.wrong { color: #ef5350; }
.quiz-detail-section .section-title.ungraded { color: #ffa726; }
.quiz-detail-section .section-title.unanswered { color: #888; }

.quiz-detail-section .section-count {
  font-size: 11px;
  color: #aaa;
}

.quiz-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 6px;
}

.quiz-detail-grid .detail-card {
  background: rgba(60,64,75,0.8);
  border-radius: 6px;
  padding: 6px;
  text-align: center;
}

.quiz-detail-grid .detail-card .avatar {
  width: 36px;
  height: 28px;
  background: rgba(200,200,200,0.15);
  border-radius: 4px;
  margin: 0 auto 3px;
}

.quiz-detail-grid .detail-card .name {
  font-size: 9px;
  color: #ccc;
}

/* Fullscreen 讲题模式 — rendered inside big screen */
.quiz-fs-overlay {
  position: absolute;
  inset: 0;
  background: rgba(20,22,30,0.97);
  z-index: 20;
  display: flex;
  color: #fff;
  animation: fadeIn 0.3s;
}

/* Left: bar chart nav */
.quiz-fs-sidebar {
  width: 52px;
  background: rgba(15,18,25,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 4px;
  gap: 2px;
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.06);
}

.quiz-fs-bar-item {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
}

.quiz-fs-bar-item:hover {
  background: rgba(255,255,255,0.06);
}

.quiz-fs-bar-item.selected {
  background: rgba(79,195,247,0.15);
}

.quiz-fs-bar-item .fs-bar-num {
  font-size: 9px;
  color: #888;
  margin-bottom: 2px;
}

.quiz-fs-bar-item.selected .fs-bar-num {
  color: #4fc3f7;
  font-weight: 600;
}

.quiz-fs-bar-item .fs-bar-track {
  width: 28px;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}

.quiz-fs-bar-item .fs-bar-fill {
  height: 100%;
  border-radius: 3px;
  opacity: 0.5;
}

.quiz-fs-bar-item.selected .fs-bar-fill {
  opacity: 1;
}

.quiz-fs-bar-item .fs-bar-pct {
  font-size: 8px;
  color: #666;
  margin-top: 1px;
}

.quiz-fs-bar-item.selected .fs-bar-pct {
  color: #4fc3f7;
}

/* Main content area */
.quiz-fs-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 14px 20px;
  overflow-y: auto;
  min-width: 0;
  background: #fff;
  color: #222;
}

.quiz-fs-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-shrink: 0;
}

.quiz-fs-header .fs-title {
  display: flex;
  align-items: center;
  gap: 8px;
}

.quiz-fs-header .fs-title h3 {
  font-size: 14px;
  font-weight: 600;
  color: #222;
}

.quiz-fs-badge {
  font-size: 9px;
  background: #e3f2fd;
  color: #1565c0;
  padding: 2px 8px;
  border-radius: 10px;
}

.quiz-fs-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  border: none;
  color: #333;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quiz-fs-close:hover {
  background: rgba(0,0,0,0.12);
}

/* Zoom control bar */
.quiz-fs-zoom {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  margin-bottom: 10px;
}

.quiz-fs-zoom-btn {
  width: 24px; height: 24px;
  border-radius: 4px;
  background: rgba(0,0,0,0.05);
  border: 1px solid rgba(0,0,0,0.1);
  color: #555;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.quiz-fs-zoom-btn:hover {
  background: rgba(0,0,0,0.1);
}

.quiz-fs-zoom-label {
  font-size: 10px;
  color: #666;
  min-width: 32px;
  text-align: center;
}

/* Content sections */
.quiz-fs-section {
  margin-bottom: 12px;
}

.quiz-fs-section-label {
  font-size: 10px;
  color: #666;
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.quiz-fs-content-box {
  background: #fafafa;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 16px 20px;
  line-height: 1.8;
  color: #222;
  white-space: pre-wrap;
  transition: font-size 0.2s;
}

.quiz-fs-answer-box {
  background: #f1f8e9;
  border: 1px solid #c5e1a5;
  border-radius: 10px;
  padding: 12px 16px;
  color: #33691e;
  line-height: 1.6;
  white-space: pre-wrap;
  transition: font-size 0.2s;
}

.quiz-fs-explain-box {
  background: #e3f2fd;
  border: 1px solid #90caf9;
  border-radius: 10px;
  padding: 12px 16px;
  color: #1565c0;
  line-height: 1.6;
  white-space: pre-wrap;
  transition: font-size 0.2s;
}

/* Stats row in fullscreen */
.quiz-fs-stats-row {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  margin-top: auto;
  padding-top: 10px;
}

.quiz-fs-stat {
  background: #f5f5f5;
  border: 1px solid #e0e0e0;
  border-radius: 6px;
  padding: 8px 14px;
  text-align: center;
}

.quiz-fs-stat .fs-val {
  font-size: 18px;
  font-weight: 700;
}

.quiz-fs-stat .fs-val.green { color: #2e7d32; }
.quiz-fs-stat .fs-val.red { color: #c62828; }
.quiz-fs-stat .fs-val.orange { color: #e65100; }
.quiz-fs-stat .fs-val.gray { color: #666; }

.quiz-fs-stat .fs-label {
  font-size: 9px;
  color: #666;
  margin-top: 2px;
}

/* Fullscreen: student answer detail */
.quiz-fs-answers {
  margin-top: 4px;
}

.quiz-fs-answers .ans-group {
  margin-bottom: 10px;
}

.quiz-fs-answers .ans-group-title {
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.quiz-fs-answers .ans-group-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.quiz-fs-answers .ans-group-title .dot.green { background: #4caf50; }
.quiz-fs-answers .ans-group-title .dot.red { background: #e53935; }

.quiz-fs-answers .ans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
}

.quiz-fs-answers .ans-card {
  background: #f8f8f8;
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.quiz-fs-answers .ans-card .ans-thumb {
  width: 80px;
  height: 56px;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s;
}

.quiz-fs-answers .ans-card .ans-thumb:hover {
  transform: scale(1.05);
}

  top: 8px;

  background: linear-gradient(135deg, #ff9800, #f44336);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(255,152,0,0.4);
  animation: pointsPop 1.8s ease forwards;
  z-index: 100;
  pointer-events: none;
}
.points-anim.high {
  background: linear-gradient(135deg, #ffd700, #ff9800);
  font-size: 14px;
  padding: 5px 12px;
}
@keyframes pointsPop {
  0% { opacity: 0; transform: translateY(6px) scale(0.8); }
  15% { opacity: 1; transform: translateY(0) scale(1.1); }
  30% { transform: translateY(0) scale(1); }
  75% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-10px); }
}

<body>

<script>
// ======= Global State =======
const state = {
  scene: 'choice', // choice | quiz | photo | interact
  // choice phases: idle → toolbox → config → active → result → answer → end
  phase: 'idle',
  timer: 60,
  answered: 0,
  total: 43,
  studentAnswer: null,
  correctAnswer: 'B',
  timerInterval: null,
  autoInterval: null,
  delayTimeout: null,
  // choice config
  choiceType: 'single', // single | multi | judge
  choiceOptionCount: 4,
  choiceCountdown: 10,
  // result panel
  selectedAnswers: [],   // teacher-selected correct answers
  answerPublished: false, // whether answer has been published in result phase
  allCorrect: false, // "以上都对" mode - all answers are correct
  configSource: null, // 'bigscreen' | 'teacher' - tracks who opened config
  // quiz
  quizSubmitted: 0,
  quizTab: 'student', // 'student' | 'question'
  quizSelectedQ: 0,   // selected question index in 题目数据 tab
  quizFullscreen: false, // 讲题模式
  quizFontSize: 14,     // 讲题模式字号
  lightboxStudent: null, // 放大查看的学生索引
  lightboxCorrect: false,
  quizConfigShow: false, // 随堂测发起倒计时弹窗
  quizConfigSource: null, // 'bigscreen' | 'teacher'
  quizTimerDuration: 300, // 默认5分钟
  // photo
  photosReceived: 0,
  photoOnWallIdx: -1,   // 当前上墙学生索引（-1=无人上墙）
  photoSelectedIdx: 0,  // 当前选中学生索引
  photoTab: 'done',     // 'done' | 'undone'
  photoStarred: [],     // 星标学生索引列表（用于多人上墙）
  photoMultiIdx: 0,     // 多人上墙时大屏当前展示的索引
  photoConfigShow: false, // 拍照上墙发起倒计时弹窗
  photoTimerDuration: 120, // 默认2分钟
  // interact (单个互动题)
  interactSubmitted: 0,
  interactCorrect: 0,
  interactShowDetail: false,
  interactStudentDone: false,
  interactQType: 'objective', // 'objective' | 'subjective'
  // homework
  hwSelectedQ: 0,
  hwFullscreen: false,
  hwFontSize: 14,
  // summary
  summaryTab: 'personal' // 'personal' | 'group'
};

const steps = {
  choice: ['工具箱', '选择题型', '设置发布', '作答中', '统计结果', '公布答案', '结束'],
  interact: ['待发起', '作答中', '数据面板', '作答详情', '结束'],
  quiz: ['待发起', '作答中', '查看数据', '结束'],
  photo: ['待发起', '拍照收集/选人上墙', '上墙展示', '结束'],
  homework: ['题目数据', '全屏讲题'],
  summary: ['排行榜单']
};

const phaseMap = {
  choice: ['idle', 'toolbox', 'config', 'active', 'result', 'answer', 'end'],
  interact: ['idle', 'active', 'result', 'detail', 'end'],
  quiz: ['idle', 'active', 'result', 'end'],
  photo: ['idle', 'active', 'result', 'end'],
  homework: ['result', 'fullscreen'],
  summary: ['active']
};

// ======= Scene & Phase =======
function switchScene(scene) {
  clearIntervals();
  state.scene = scene;
  state.phase = scene === 'homework' ? 'result' : scene === 'summary' ? 'active' : 'idle';
  resetState();
  render();
  updateTabs();
}

function resetState() {
  state.timer = 60;
  state.answered = 0;
  state.studentAnswer = null;
  state.studentSelections = [];
  state.quizSubmitted = 0;
  state.quizTab = 'student';
  state.quizSelectedQ = 0;
  state.quizFullscreen = false;
  state.quizFontSize = 14;
  state.lightboxStudent = null;
  state.lightboxCorrect = false;
  state.quizConfigShow = false;
  state.quizConfigSource = null;
  state.quizTimerDuration = 300;
  state.photosReceived = 0;
  state.photoOnWallIdx = -1;
  state.photoSelectedIdx = 0;
  state.photoTab = 'done';
  state.photoStarred = [];
  state.photoMultiIdx = 0;
  state.photoConfigShow = false;
  state.choiceType = 'single';
  state.choiceOptionCount = 4;
  state.choiceCountdown = 10;
  state.selectedAnswers = [];
  state.answerPublished = false;
  state.allCorrect = false;
  state.configSource = null;
  state.interactSubmitted = 0;
  state.interactCorrect = 0;
  state.interactShowDetail = false;
  state.interactStudentDone = false;
  state.hwSelectedQ = 0;
  state.hwFullscreen = false;
  state.hwFontSize = 14;
  state.summaryTab = 'personal';
}

function clearIntervals() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  if (state.autoInterval) { clearInterval(state.autoInterval); state.autoInterval = null; }
  if (state.delayTimeout) { clearTimeout(state.delayTimeout); state.delayTimeout = null; }
}

// ======= Choice: step-by-step flow =======
function openToolbox() {
  state.phase = 'toolbox';
  render();
}

function selectChoiceFromToolbox() {
  state.phase = 'config';
  state.configSource = 'bigscreen';
  render();
}

function setChoiceType(type) {
  state.choiceType = type;
  if (type === 'judge') state.choiceOptionCount = 2;
  else if (state.choiceOptionCount < 3) state.choiceOptionCount = 4;
  render();
}

function setOptionCount(n) {
  state.choiceOptionCount = n;
  render();
}

function setCountdown(s) {
  state.choiceCountdown = s;
  state.timer = s;
  render();
}

function confirmPublish() {
  state.phase = 'active';
  state.timer = state.choiceCountdown;
  state.answered = 0;
  startActivePhase();
  render();
}

// ======= Quiz Config Popup =======
function showQuizConfig(source) {
  state.quizConfigShow = true;
  state.quizConfigSource = source;
  render();
}

function selectQuizDuration(val) {
  state.quizTimerDuration = val;
  render();
}

function cancelQuizConfig() {
  state.quizConfigShow = false;
  state.quizConfigSource = null;
  render();
}

function confirmQuizConfig() {
  state.quizConfigShow = false;
  state.quizConfigSource = null;
  launchInteraction();
}

function renderQuizConfigPopup() {
  const options = [
    { val: 300, label: '5 分钟' },
    { val: 600, label: '10 分钟' },
    { val: 0, label: '不限时' }
  ];
  let optsHtml = options.map(o => `
    <div class="popup-opt ${state.quizTimerDuration === o.val ? 'selected' : ''}" onclick="selectQuizDuration(${o.val})">
      <div class="radio"></div>
      <span>${o.label}</span>
    </div>`).join('');

  return `<div class="quiz-config-popup">
    <div class="popup-title">设置检测倒计时</div>
    <div class="popup-options">${optsHtml}</div>
    <div class="popup-actions">
      <button class="popup-btn cancel" onclick="cancelQuizConfig()">取消</button>
      <button class="popup-btn confirm" onclick="confirmQuizConfig()">发送</button>
    </div>
  </div>`;
}

function renderTeacherQuizConfig(content) {
  const options = [
    { val: 300, label: '5 分钟' },
    { val: 600, label: '10 分钟' },
    { val: 0, label: '不限时' }
  ];
  let optsHtml = options.map(o => `
    <div class="tqc-opt ${state.quizTimerDuration === o.val ? 'selected' : ''}" onclick="selectQuizDuration(${o.val})">
      <div class="radio"></div>
      <span>${o.label}</span>
    </div>`).join('');

  content.innerHTML = `<div class="teacher-quiz-config fade-in">
    <div class="tqc-title">设置检测倒计时</div>
    <div class="tqc-options">${optsHtml}</div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="ctrl-btn" style="background:#eee;color:#666;" onclick="cancelQuizConfig()">取消</button>
      <button class="ctrl-btn primary" onclick="confirmQuizConfig()">发送随堂测</button>
    </div>
  </div>`;
}

// ======= Photo Config (duration selection) =======
function selectPhotoDuration(val) {
  state.photoTimerDuration = val;
  render();
}

function cancelPhotoConfig() {
  state.photoConfigShow = false;
  state.scene = 'choice';
  state.phase = 'idle';
  render();
}

function confirmPhotoConfig() {
  state.photoConfigShow = false;
  launchInteraction();
}

// ======= Launch Interaction (quiz/photo) =======
function launchInteraction() {
  clearIntervals();
  state.phase = 'active';
  state.timer = 60;
  state.answered = 0;
  state.quizSubmitted = 0;
  state.photosReceived = 0;
  startActivePhase();
  render();
}

function startActivePhase() {
  clearIntervals();

  // Demo: quiz gets longer countdown to allow tab exploration
  const demoSeconds = state.scene === 'quiz' ? 6 : 3;
  state.timer = demoSeconds;

  // Simulate students answering quickly during 3s
  state.autoInterval = setInterval(() => {
    if (state.scene === 'choice') {
      if (state.answered < state.total) { state.answered += 5; if (state.answered > state.total) state.answered = state.total; }
    } else if (state.scene === 'interact') {
      if (state.interactSubmitted < state.total) {
        const batch = Math.floor(Math.random() * 4) + 3;
        state.interactSubmitted += batch;
        if (state.interactSubmitted > state.total) state.interactSubmitted = state.total;
        state.interactCorrect += Math.round(batch * 0.7);
        if (state.interactCorrect > state.interactSubmitted) state.interactCorrect = Math.round(state.interactSubmitted * 0.7);
      }
    } else if (state.scene === 'quiz') {
      if (state.quizSubmitted < state.total) { state.quizSubmitted += 5; if (state.quizSubmitted > state.total) state.quizSubmitted = state.total; }
    } else if (state.scene === 'photo') {
      if (state.photosReceived < state.total) { state.photosReceived += 5; if (state.photosReceived > state.total) state.photosReceived = state.total; }
    }
    updateCounters();
  }, 500);

  // Countdown 3s then auto-stop and show result
  state.timerInterval = setInterval(() => {
    state.timer--;
    updateCounters();
    if (state.timer <= 0) {
      clearIntervals();
      // Fill all answers
      if (state.scene === 'choice') state.answered = state.total;
      else if (state.scene === 'interact') { state.interactSubmitted = state.total; state.interactCorrect = Math.round(state.total * 0.7); }
      else if (state.scene === 'quiz') state.quizSubmitted = state.total;
      else state.photosReceived = state.total;
      // Directly show result panel
      state.phase = 'result';
      render();
    }
  }, 1000);
}

// Lightweight update: only change counter text, no full DOM rebuild
function updateCounters() {
  // Big screen counters
  const bsTimer = document.getElementById('bs-timer');
  const bsCount = document.getElementById('bs-count');
  if (bsTimer) {
    if (state.scene === 'quiz') {
      bsTimer.textContent = state.timer > 0 ? formatCountdown(state.timer) : '00 : 00 : 00';
    } else {
      if (state.choiceCountdown === 0) bsTimer.textContent = '不限时';
      else bsTimer.textContent = state.timer > 0 ? formatTime(state.timer) : '等待统计...';
    }
  }
  if (bsCount) {
    if (state.scene === 'choice') bsCount.textContent = `已作答 ${state.answered}/${state.total} 人`;
    else if (state.scene === 'quiz') bsCount.textContent = state.quizSubmitted;
    else bsCount.textContent = `${state.photosReceived} 张已收集`;
  }
  // Teacher counters
  const tTimer = document.getElementById('t-timer');
  const tCount = document.getElementById('t-count');
  if (tTimer) tTimer.textContent = formatTime(state.timer);
  if (tCount) {
    if (state.scene === 'choice') tCount.textContent = state.answered;
    else if (state.scene === 'quiz') tCount.textContent = state.quizSubmitted;
    else tCount.textContent = state.photosReceived;
  }
  // Teacher status bar
  const statusText = document.getElementById('teacherStatusText');
  if (statusText && state.phase === 'active') {
    if (state.scene === 'choice') statusText.textContent = `选择题进行中 · 已答 ${state.answered}/${state.total}`;
    else if (state.scene === 'interact') statusText.textContent = `互动题作答中 · ${state.interactSubmitted}/${state.total} 已提交`;
    else if (state.scene === 'quiz') statusText.textContent = `随堂测进行中 · ${state.quizSubmitted}/${state.total} 已交`;
    else statusText.textContent = `拍照上墙 · ${state.photosReceived} 张已收`;
  }
}

  if (type === 'choice') {
    state.scene = 'choice';

    state.configSource = 'teacher';
    updateTabs();
    render();
  } else if (type === 'interact') {
    state.scene = 'interact';
    updateTabs();
    launchInteract();
  } else if (type === 'quiz') {
    state.scene = 'quiz';
    showQuizConfig('teacher');

  } else if (type === 'photo') {

    updateTabs();
    render();
  }
}

function showPointsAnim(points, label) {
  const container = document.getElementById('studentContent');
  if (!container) return;
  // Remove existing animation if any
  const existing = container.querySelector('.points-anim');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'points-anim' + (points >= 3 ? ' high' : '');
  el.textContent = `+${points} ⭐ ${label || ''}`;
  container.style.position = 'relative';
  container.appendChild(el);
  setTimeout(() => el.remove(), 1900);
}

function renderStepBar() {
  const bar = document.getElementById('stepBar');
  const sceneSteps = steps[state.scene];
  const phases = phaseMap[state.scene];
  const currentIdx = phases.indexOf(state.phase);

  let html = '';
  sceneSteps.forEach((s, i) => {
    if (i > 0) html += '<span class="step-arrow">→</span>';
    const cls = i === currentIdx ? 'active' : (i < currentIdx ? 'done' : '');
    html += `<span class="step ${cls}" onclick="goToStep(${i})">${s}</span>`;
  });
  bar.innerHTML = html;
}

function goToStep(idx) {
  clearIntervals();
  const phases = phaseMap[state.scene];
  if (idx === 0) {
    resetState();
    state.phase = phases[0];
  } else if (idx < phases.length) {
    state.phase = phases[idx];
    if (state.phase === 'active') {
      state.answered = Math.floor(state.total * 0.6);
      state.interactSubmitted = Math.floor(state.total * 0.4);
      state.interactCorrect = Math.round(state.interactSubmitted * 0.7);
      state.quizSubmitted = Math.floor(state.total * 0.6);
      state.photosReceived = Math.floor(state.total * 0.6);
      state.timer = 35;
    } else if (state.phase === 'result' || state.phase === 'detail') {
      state.answered = state.total;
      state.interactSubmitted = state.total;
      state.interactCorrect = Math.round(state.total * 0.7);
      state.quizSubmitted = state.total;
      state.photosReceived = state.total;
      state.timer = 0;
    } else if (state.phase === 'answer') {
      state.answered = state.total;
      state.studentAnswer = 'B';
    } else if (state.phase === 'fullscreen') {
      state.hwFullscreen = true;
    } else if (state.phase === 'end') {
      resetState();
      state.phase = 'idle';
    }
  }
  render();
}

      html += `<button class="bs-launch-btn" onclick="launchInteraction()">发起拍照上墙</button>`;

    html += renderBsSummary();

function getCoursewareText() {
  if (state.scene === 'choice') {
    return '若函数 f(x) = x² - 2x + a 在区间 [0, 3] 上<br>最小值为 -1，则 a 的值为？<br><br>A. -2 &nbsp;&nbsp; B. 0 &nbsp;&nbsp; C. 1 &nbsp;&nbsp; D. 2';
  } else if (state.scene === 'interact') {
    if (state.interactQType === 'subjective') {
      return '如图，在△ABC中，AB=AC，D是BC的中点。<br>求证：AD⊥BC';
    }
    return '已知 x²+5x+6=0，则 x 的值为？<br><br>A. x=-1 或 x=-6 &nbsp; B. x=-2 或 x=-3<br>C. x=2 或 x=3 &nbsp;&nbsp;&nbsp; D. x=1 或 x=6';
  } else if (state.scene === 'quiz') {
    return '随堂练习<br><br>1. 求导：f(x) = 3x² + 2x - 1<br>2. 计算：∫₀¹ (2x+1)dx';
  } else if (state.scene === 'homework') {
    return '6月2日数学作业 · 讲评';
  } else if (state.scene === 'summary') {
    return '排行榜单';
  } else {
    return '请同学们将课堂笔记拍照上传<br><br>📷 拍照上墙';
  }
}

function getMockStudentAnswers() {
  const labels = state.choiceType === 'judge' ? ['对', '错'] : 'ABCDEFGHIJ'.slice(0, state.choiceOptionCount).split('');
  const correctAns = state.selectedAnswers.join('');
  const answers = [];
  for (let i = 0; i < state.total; i++) {
    if (state.choiceType === 'multi') {
      // Multi: generate combos
      const combos = [correctAns, 'ACD', 'A', 'BD', 'ABC', correctAns, correctAns, 'B', correctAns, 'AD'];
      answers.push({ name: STUDENT_NAMES[i] || `学生${i+1}`, answer: combos[i % combos.length] });

function getResultPanelInner() {
  const typeName = state.choiceType === 'single' ? '单选' : state.choiceType === 'multi' ? '多选' : '判断';
  const published = state.answerPublished;
  const labels = state.choiceType === 'judge' ? ['对', '错'] : 'ABCDEFGHIJ'.slice(0, state.choiceOptionCount).split('');
  const mockBase = [15, 58, 18, 9, 5, 3, 2, 1, 1, 1];
  const pcts = labels.map((_, i) => mockBase[i] || 1);

  // Build option bars with clickable labels
  let barsHtml = '';
  labels.forEach((lbl, i) => {
    const isSelected = state.selectedAnswers.includes(lbl);
    const selClass = isSelected ? 'selected' : '';
    const correctClass = (published && isSelected) ? 'correct' : '';
    barsHtml += `<div class="result-bar-item">
      <span class="option-label clickable ${selClass}" onclick="toggleAnswerOption('${lbl}')">${lbl}${published && isSelected ? ' ✓' : ''}</span>
      <div class="bar"><div class="bar-fill ${correctClass}" style="width:${pcts[i]}%"></div></div>
      <span class="pct">${pcts[i]}%</span>
    </div>`;
  });

  // Action button
  let actionHtml = '';
  if (!published) {
    const disabled = state.selectedAnswers.length === 0 ? 'disabled' : '';
    actionHtml = `<div class="result-panel-actions">
      <button class="ctrl-btn primary" onclick="publishResultAnswer()" ${disabled}>发布答案</button>
      <button class="ctrl-btn success" onclick="setAllCorrect()" style="font-size:11px;">以上都对</button>
    </div>`;
  } else {
    const ansText = state.allCorrect ? '全部正确' : state.selectedAnswers.join(',');
    actionHtml = `<div class="result-panel-actions">
      <button class="ctrl-btn danger" onclick="endInteraction()">确定关闭</button>
      <span style="font-size:11px;color:#66bb6a;">✓ 答案：${ansText}</span>
    </div>`;
  }

  return `<h3>作答分布 <span style="font-size:11px;color:#888;font-weight:400;">（${typeName} · 点击选项设为正确答案）</span></h3>
    <div class="result-bars">${barsHtml}</div>
    ${actionHtml}`;
}

function getDetailPanelHtml() {
  if (state.allCorrect) {
    // All correct mode: everyone is marked correct
    const names = STUDENT_NAMES.slice(0, state.total);
    return `<div class="detail-header">作答详情 · 正确率 100%</div>
      <div class="detail-group correct-group">
        <div class="detail-group-head"><span class="detail-correct-tag">全部正确</span> <span class="detail-count">${state.total}人</span></div>
        <div class="detail-group-names">${names.join('、')}</div>
      </div>`;
  }
  const correctAns = state.selectedAnswers.join('');
  const students = getMockStudentAnswers();
  // Group by answer combination
  const groups = {};
  students.forEach(s => {
    const key = s.answer;
    if (!groups[key]) groups[key] = [];
    groups[key].push(s.name);
  });
  // Sort: correct first, then by count descending
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    if (a === correctAns) return -1;
    if (b === correctAns) return 1;
    return groups[b].length - groups[a].length;
  });
  const correctCount = groups[correctAns] ? groups[correctAns].length : 0;
  const accuracy = Math.round(correctCount / state.total * 100);

  let html = `<div class="detail-header">作答详情 · 正确率 ${accuracy}%</div>`;
  sortedKeys.forEach(key => {
    const isCorrect = key === correctAns;
    const students = groups[key];
    const prefix = isCorrect ? `<span class="detail-correct-tag">正确</span> ${key}` : `选项 ${key}`;
    html += `<div class="detail-group ${isCorrect ? 'correct-group' : ''}">
      <div class="detail-group-head">${prefix} <span class="detail-count">${students.length}人</span></div>
      <div class="detail-group-names">${students.join('、')}</div>
    </div>`;
  });
  return html;
}

function toggleAnswerOption(opt) {
  if (state.answerPublished) return; // locked after publish
  state.allCorrect = false; // clear "以上都对" if manually selecting
  if (state.choiceType === 'single' || state.choiceType === 'judge') {
    // Single select: toggle or replace
    if (state.selectedAnswers.includes(opt)) {
      state.selectedAnswers = [];
    } else {
      state.selectedAnswers = [opt];
    }
  } else {
    // Multi select: toggle in array
    const idx = state.selectedAnswers.indexOf(opt);
    if (idx >= 0) {
      state.selectedAnswers.splice(idx, 1);
    } else {
      state.selectedAnswers.push(opt);
    }
  }
  // Only update panel content without full re-render to avoid animation flicker
  const panel = document.querySelector('.bs-result-panel');
  if (panel) {
    panel.innerHTML = getResultPanelInner();
  }
}

function publishResultAnswer() {
  if (state.selectedAnswers.length === 0 && !state.allCorrect) return;
  state.answerPublished = true;
  if (state.allCorrect) {
    state.correctAnswer = '全部正确';
  } else {
    state.correctAnswer = state.selectedAnswers.join('');
  }
  render();
  // Points animation: student got it right → +1
  const selected = state.studentAnswer || 'B';
  const isCorrect = state.allCorrect || state.selectedAnswers.includes(selected);
  if (isCorrect) {
    setTimeout(() => showPointsAnim(1, '答对'), 300);
  }
}

function getAccuracyColor(accuracy, submitted) {
  if (!submitted) return '#666';  // 灰色：尚未提交

  if (accuracy >= 85) return '#8bc34a';         // 浅绿色
  if (accuracy >= 60) return '#ffeb3b';         // 黄色
  if (accuracy >= 30) return '#ff9800';         // 橙黄色
  return '#f44336';                              // 红色（<30% 及 0%）
}

// Simulated student answer types for demo
const studentAnswerTypes = ['image', 'image', 'text', 'image', 'text', 'image', 'text', 'image', 'image', 'text'];
// Simulated image hues for visual variety
const imgHues = [200, 140, 280, 30, 170, 320, 50, 220, 90, 260];
// Simulated text answers
const textAnswers = ['6x+2', 'f\'=6x+2', '6x', '6x+3', '3x+2', 'x²+2', '6x+1', '6x-2', '2x+6', '6x+2'];

function renderFsStudentAnswers(correctCount, wrongCount) {
  let correctCards = '';
  for (let i = 0; i < Math.min(correctCount, 8); i++) {
    const name = quizStudents[i];
    const isImg = studentAnswerTypes[i % studentAnswerTypes.length] === 'image';
    const hue = imgHues[i % imgHues.length];
    if (isImg) {
      correctCards += `<div class="ans-card">
        <div class="ans-thumb" onclick="openLightbox(${i}, true)">
          <div style="width:100%;height:100%;background:linear-gradient(135deg, hsl(${hue},40%,85%), hsl(${hue},50%,75%));display:flex;align-items:center;justify-content:center;font-size:10px;color:hsl(${hue},30%,40%);">手写作答</div>
          <span class="zoom-hint">点击放大</span>
        </div>
        <span class="ans-name">${name}</span>
        <span class="ans-tag correct">✓ 正确</span>
      </div>`;
    } else {
      correctCards += `<div class="ans-card">
        <div class="ans-text">${textAnswers[i % textAnswers.length]}</div>
        <span class="ans-name">${name}</span>
        <span class="ans-tag correct">✓ 正确</span>
      </div>`;
    }
  }

  let wrongCards = '';
  for (let i = 0; i < Math.min(wrongCount, 8); i++) {
    const sIdx = (correctCount + i) % quizStudents.length;
    const name = quizStudents[sIdx];
    const isImg = studentAnswerTypes[(correctCount + i) % studentAnswerTypes.length] === 'image';
    const hue = imgHues[(correctCount + i) % imgHues.length];
    if (isImg) {
      wrongCards += `<div class="ans-card">
        <div class="ans-thumb" onclick="openLightbox(${sIdx}, false)">
          <div style="width:100%;height:100%;background:linear-gradient(135deg, hsl(${hue},35%,88%), hsl(${hue},40%,78%));display:flex;align-items:center;justify-content:center;font-size:10px;color:hsl(${hue},30%,45%);">手写作答</div>
          <span class="zoom-hint">点击放大</span>
        </div>
        <span class="ans-name">${name}</span>
        <span class="ans-tag wrong">✗ 错误</span>
      </div>`;
    } else {
      wrongCards += `<div class="ans-card">
        <div class="ans-text">${textAnswers[(correctCount + i) % textAnswers.length]}</div>
        <span class="ans-name">${name}</span>
        <span class="ans-tag wrong">✗ 错误</span>
      </div>`;
    }
  }

  return `
    <div class="ans-group">
      <div class="ans-group-title"><span class="dot green"></span><span style="color:#66bb6a;">回答正确 (${correctCount}人)</span></div>
      <div class="ans-grid">${correctCards}</div>
    </div>
    <div class="ans-group">
      <div class="ans-group-title"><span class="dot red"></span><span style="color:#ef5350;">回答错误 (${wrongCount}人)</span></div>
      <div class="ans-grid">${wrongCards}</div>
    </div>`;
}

function openLightbox(studentIdx, isCorrect) {
  state.lightboxStudent = studentIdx;
  state.lightboxCorrect = isCorrect;
  render();
}

function closeLightbox() {
  state.lightboxStudent = null;
  render();
}

function renderLightbox() {
  const name = quizStudents[state.lightboxStudent % quizStudents.length];
  const hue = imgHues[state.lightboxStudent % imgHues.length];
  const tag = state.lightboxCorrect
    ? '<span style="background:rgba(102,187,106,0.2);color:#66bb6a;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">✓ 正确</span>'
    : '<span style="background:rgba(239,83,80,0.2);color:#ef5350;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">✗ 错误</span>';
  return `<div class="quiz-lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
    <div class="lb-content" onclick="event.stopPropagation()">
      <div style="width:400px;height:300px;background:linear-gradient(135deg, hsl(${hue},40%,92%), hsl(${hue},50%,82%));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;">
        <div style="font-size:14px;color:hsl(${hue},30%,35%);">学生手写作答内容</div>
        <div style="width:260px;height:160px;background:rgba(255,255,255,0.7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;color:hsl(${hue},30%,30%);font-style:italic;">f'(x) = 6x + 2</div>
      </div>
      <div class="lb-name">${name} ${tag}</div>
    </div>
  </div>`;
}

function formatCountdown(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${h.toString().padStart(2,'0')} : ${m.toString().padStart(2,'0')} : ${sec.toString().padStart(2,'0')}`;
}

function renderBsPhotoOverlay() {
  const count = state.photosReceived;
  const isOnWall = state.photoOnWallIdx >= 0;
  const isMultiWall = state.photoOnWallIdx === -2;
  const doneNames = STUDENT_NAMES.slice(0, state.photosReceived);
  const showList = state.photoTab === 'done' ? doneNames : STUDENT_NAMES.slice(state.photosReceived, state.total);

  if (isMultiWall) {
    const starNames = state.photoStarred.map(i => showList[i] || STUDENT_NAMES[i]).filter(Boolean);
    const total = starNames.length;

    return `<div class="bs-photo-overlay fade-in">

function renderTeacherChoice(content) {

    if (state.answerPublished) {
      const ansText = state.allCorrect ? '全部正确' : state.selectedAnswers.join(',');
      const rateText = state.allCorrect ? '100%' : '58%';
      content.innerHTML = `<div class="teacher-control-panel fade-in">
        <div class="panel-title">✓ 答案已公布（${ansText}）</div>
        <div class="panel-stats">
          <div>正确率 <span class="num">${rateText}</span></div>
        </div>
        <div class="panel-actions">
          <button class="ctrl-btn danger" onclick="endInteraction()">确定关闭</button>
        </div>
      </div>`;
    } else {
      // Data detail: answer distribution + set answer + actions
      const labels = state.choiceType === 'judge' ? ['对', '错'] : 'ABCDEFGHIJ'.slice(0, state.choiceOptionCount).split('');

      // Simulated distribution
      const distData = labels.map((lbl, i) => {
        const pcts = state.choiceType === 'judge' ? [65, 35] : [12, 58, 18, 12, 0, 0, 0, 0, 0, 0];

          ${isActive ? '<button class="ctrl-btn danger" onclick="endTimer()">截止作答</button>' : '<button class="ctrl-btn" style="background:#eee;color:#999;border:1px solid #ddd;" onclick="endInteraction()">结束互动</button>'}

function renderTeacherQuiz(content) {
  const done = state.phase === 'result' ? state.total : state.quizSubmitted;
  const accuracy = state.phase === 'result' ? 83 : (done > 0 ? Math.round((done / state.total) * 80) : 0);

  let tabContent = '';
  if (state.quizTab === 'student') {
    // Compact student list for teacher screen
    let studentRows = '';
    for (let i = 0; i < Math.min(done, 8); i++) {
      studentRows += `<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f0f0f0;">
        <span style="font-size:10px;color:#333;">${quizStudents[i]}</span>
        <span style="font-size:9px;color:#2e7d32;background:#e8f5e9;padding:1px 4px;border-radius:3px;">已完成</span>
      </div>`;
    }
    if (done < state.total) {
      studentRows += `<div style="font-size:9px;color:#999;padding:3px 0;text-align:center;">还有 ${state.total - done} 人未完成...</div>`;
    }
    tabContent = `<div style="max-height:90px;overflow-y:auto;">${studentRows}</div>`;
  } else {
    // Mini horizontal bar chart + selected question info
    let miniBars = '';
    quizQuestions.forEach((q, idx) => {
      const isSel = idx === state.quizSelectedQ;
      const barColor = isSel ? '#4fc3f7' : '#ddd';
      const labelColor = isSel ? '#4fc3f7' : '#888';
      miniBars += `<div onclick="selectQuizQuestion(${idx})" style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:2px 0;">
        <span style="font-size:9px;color:${labelColor};width:16px;text-align:right;flex-shrink:0;">${idx+1}</span>
        <div style="flex:1;height:10px;background:#f0f0f0;border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:${q.accuracy}%;background:${barColor};border-radius:2px;transition:all 0.2s;"></div>
        </div>
        <span style="font-size:8px;color:${labelColor};width:26px;text-align:right;flex-shrink:0;">${q.accuracy}%</span>
      </div>`;
    });
    const sel = quizQuestions[state.quizSelectedQ];
    const correctCount = Math.round(done * sel.accuracy / 100);
    const wrongCount = Math.round(done * (100 - sel.accuracy) / 100 * 0.7);
    tabContent = `<div style="max-height:100px;overflow-y:auto;">
      <div style="padding:2px 0;border-bottom:1px solid #eee;margin-bottom:4px;">${miniBars}</div>

      <div style="font-size:9px;color:#666;">正确 ${correctCount}人 · 错误 ${wrongCount}人 · 正确率 ${sel.accuracy}%</div>
    </div>`;
  }

  content.innerHTML = `<div class="teacher-control-panel fade-in" style="padding:8px 12px;gap:6px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="panel-title" style="margin:0;">随堂测${state.phase === 'active' ? '进行中' : '已截止'}</div>
      <div style="font-size:10px;color:#888;"><span id="t-timer">${formatTime(state.timer)}</span> · 完成 <span id="t-count">${done}</span>/${state.total} · 正确率 ${accuracy}%</div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin:4px 0;">
      <span onclick="switchQuizTab('student')" style="font-size:11px;cursor:pointer;padding-bottom:2px;border-bottom:${state.quizTab === 'student' ? '2px solid #4fc3f7' : 'none'};color:${state.quizTab === 'student' ? '#4fc3f7' : '#888'};">学生数据</span>
      <span onclick="switchQuizTab('question')" style="font-size:11px;cursor:pointer;padding-bottom:2px;border-bottom:${state.quizTab === 'question' ? '2px solid #4fc3f7' : 'none'};color:${state.quizTab === 'question' ? '#4fc3f7' : '#888'};">题目数据</span>
    </div>
    ${tabContent}
    <div class="panel-actions" style="margin-top:4px;">
      ${state.phase === 'active' ? '<button class="ctrl-btn danger" onclick="endTimer()">截止作答</button>' : '<button class="ctrl-btn" style="background:#eee;color:#999;border:1px solid #ddd;" onclick="endInteraction()">结束互动</button>'}
    </div>
  </div>`;
}

function renderTeacherPhoto(content) {
  if (state.photoConfigShow) {
    const options = [
      { val: 60, label: '1 分钟' },
      { val: 120, label: '2 分钟' },
      { val: 180, label: '3 分钟' },
      { val: 0, label: '不限时' }
    ];
    let optsHtml = options.map(o => `
      <div class="tqc-opt ${state.photoTimerDuration === o.val ? 'selected' : ''}" onclick="selectPhotoDuration(${o.val})">
        <div class="radio"></div>
        <span>${o.label}</span>
      </div>`).join('');
    content.innerHTML = `<div class="teacher-quiz-config fade-in">
      <div class="tqc-title">设置拍照时长</div>
      <div class="tqc-options">${optsHtml}</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button class="ctrl-btn" style="background:#eee;color:#666;" onclick="cancelPhotoConfig()">取消</button>
        <button class="ctrl-btn primary" onclick="confirmPhotoConfig()">发起拍照上墙</button>
      </div>
    </div>`;
    return;
  }
  if (state.phase === 'active' || state.phase === 'result') {
    const doneCount = state.photosReceived;
    const undoneCount = state.total - doneCount;
    const doneNames = STUDENT_NAMES.slice(0, doneCount);
    const undoneNames = STUDENT_NAMES.slice(doneCount, state.total);
    const showList = state.photoTab === 'done' ? doneNames : undoneNames;
    const selectedIdx = state.photoSelectedIdx;
    const starCount = state.photoStarred.length;
    const isStarred = state.photoStarred.includes(selectedIdx);
    const isOnWall = state.photoOnWallIdx === selectedIdx;

    const hasWall = state.photoOnWallIdx >= 0;
    const selectedIsOnWall = isOnWall;
    const isMultiMode = starCount >= 2;
    // Single contextual main button
    let mainBtnText, mainBtnAction, mainBtnDisabled = '', mainBtnClass = 'btn-wall';
    if (isMultiMode) {
      mainBtnText = `多人上墙(${starCount})`;
      mainBtnAction = 'photoDoWall()';
    } else if (selectedIsOnWall) {
      mainBtnText = '上墙中';
      mainBtnAction = '';
      mainBtnDisabled = 'disabled';
    } else if (hasWall) {
      mainBtnText = '换人上墙';
      mainBtnAction = 'photoSingleWall()';
      mainBtnClass = 'btn-wall btn-single-wall';
    } else {
      mainBtnText = '上墙展示';
      mainBtnAction = 'photoSingleWall()';
      mainBtnClass = 'btn-wall btn-single-wall';
    }

    let stripHtml = '';
    const isMultiWall = state.photoOnWallIdx === -2;
    showList.forEach((name, i) => {
      const iStarred = state.photoStarred.includes(i);
      const isItemOnWall = state.photoOnWallIdx === i || (isMultiWall && iStarred);
      const onWall = isItemOnWall ? 'on-wall' : '';
      const sel = i === selectedIdx ? 'selected' : '';
      const starred = iStarred ? 'starred' : '';
      const wallBadge = isItemOnWall ? '<span class="strip-wall-badge">进行中</span>' : '';
      const starBtn = `<span class="strip-star-btn ${iStarred ? 'active' : ''}" onclick="event.stopPropagation();photoToggleStar(${i})">✓</span>`;
      stripHtml += `<div class="photo-strip-item ${sel} ${onWall} ${starred}" onclick="photoSelectStudent(${i})">
        <div class="strip-thumb">📷${wallBadge}${starBtn}</div>
        <div class="strip-name">${name}</div>
      </div>`;
    });

    const previewName = showList[selectedIdx] || showList[0] || '';
    content.innerHTML = `<div class="photo-select-panel fade-in">
      <div class="photo-select-header">
        <span class="photo-stat ${state.photoTab === 'done' ? 'active' : ''}" onclick="switchPhotoTab('done')">已作答 ${doneCount}</span>
        <span class="photo-stat-sep">|</span>
        <span class="photo-stat ${state.photoTab === 'undone' ? 'active' : ''}" onclick="switchPhotoTab('undone')">未作答 ${undoneCount}</span>
      </div>
      <div class="photo-select-body">
        <button class="nav-arrow left" onclick="photoNavPrev()">‹</button>
        <button class="nav-arrow right" onclick="photoNavNext()">›</button>
        <div class="photo-preview-area">
          <div class="preview-img">
            <button class="photo-star-btn ${isStarred ? 'active' : ''}" onclick="photoToggleStar()" title="加入上墙名单">✓</button>
            <div style="text-align:center;padding:12px;">
              <div style="font-size:28px;margin-bottom:6px;">📄</div>
              <div style="font-size:11px;color:#aaa;">${previewName}的课堂笔记</div>
              ${isOnWall ? '<div style="font-size:10px;color:#00bcd4;margin-top:4px;">当前上墙中</div>' : ''}
            </div>
          </div>
        </div>
        <div class="photo-strip">${stripHtml}</div>
      </div>
      <div class="photo-select-actions photo-actions-sm">
        <button class="btn-end" onclick="endInteraction()">结束</button>
        <button class="${mainBtnClass}" onclick="${mainBtnAction}" ${mainBtnDisabled}>${mainBtnText}</button>
      </div>
    </div>`;
  }
}

function renderStudent() {
  const content = document.getElementById('studentContent');
  const isIdle = state.phase === 'idle' || state.phase === 'toolbox' || state.phase === 'config';

  if (isIdle) {
    content.innerHTML = `<div class="student-content">
      <div style="font-size:28px;margin-bottom:8px;">📖</div>
      <div style="font-size:13px;color:#666;">课件同步中</div>
      <div style="font-size:11px;color:#bbb;margin-top:4px;">第3章 函数的基本性质</div>
    </div>`;
    return;
  }

  if (state.scene === 'choice') {
    renderStudentChoice(content);
  } else if (state.scene === 'interact') {
    renderStudentInteract(content);
  } else if (state.scene === 'quiz') {
    renderStudentQuiz(content);
  } else if (state.scene === 'photo') {
    renderStudentPhoto(content);
  } else if (state.scene === 'homework') {
    renderStudentHomework(content);
  } else if (state.scene === 'summary') {
    renderStudentSummary(content);

}

        <div class="student-waiting">

      const selections = state.studentSelections || [];

      content.innerHTML = `<div class="student-content">
        <div style="font-size:12px;color:#666;margin-bottom:8px;">请选择答案（${typeTip}）：</div>

      </div>`;

    if (state.answerPublished) {
      const selected = state.studentAnswer || 'B';

      const ansText = state.allCorrect ? '全部正确' : state.selectedAnswers.join(',');

        <div style="font-size:14px;font-weight:600;color:${isCorrect ? '#4caf50' : '#f44336'};margin-bottom:8px;">

        <div style="font-size:12px;color:#666;">正确答案：<strong style="color:#4caf50">${ansText}</strong></div>
        <div style="font-size:11px;color:#999;margin-top:8px;">你的选择：${selected}</div>
      </div>`;
    } else {
      content.innerHTML = `<div class="student-content">
        <div class="student-waiting">
          <div class="icon">⏳</div>
          <div>已提交，等待老师公布答案</div>
        </div>
      </div>`;
    }
  }
}

// ======= Interact (单个互动题) =======
const interactStudentNames = [
  '张小明','王小红','李大志','赵小丽','刘强','陈雪','周文','黄丽','吴凯','孙悦',
  '杨帆','马超','林静','何伟','郑磊','冯颖','邓涛','曹婷','彭杰','董丽',
  '吕鑫','蒋莉','韩波','唐敏','沈宇','潘洋','程亮','蔡宁','贾慧','田源',
  '任翔','卢雨','方圆','石磊','谭琳','付博','姜涛','汪洋','邹琪','高鹏',
  '夏雪','范鑫','廖明'
];

function launchInteract() {
  clearIntervals();
  state.phase = 'active';
  state.interactSubmitted = 0;
  state.interactCorrect = 0;
  state.interactStudentDone = false;
  startActivePhase();
  render();
}

function interactShowDetail() {
  state.phase = 'detail';
  render();
}

function interactBackToPanel() {
  state.phase = 'result';
  render();
}

function interactEnd() {
  clearIntervals();
  state.phase = 'idle';
  resetState();
  render();
}

function interactStudentSubmit() {
  state.interactStudentDone = true;
  state.interactSubmitted++;
  const correct = Math.random() < 0.7;
  if (correct) state.interactCorrect++;
  render();
  // Points animation: interactive question answered correctly → +1
  if (correct) {
    setTimeout(() => showPointsAnim(1, '答对'), 400);
  }
}

function switchInteractQType(type) {
  state.interactQType = type;
  render();
}

function renderBsInteract() {
  if (state.phase === 'idle') {
    // Show launch button
    return `<button class="bs-launch-btn" onclick="launchInteract()">发起<span class="new-tag">NEW</span></button>`;
  } else if (state.phase === 'active' || state.phase === 'result') {
    // NEW: Data panel during answering
    const submitted = state.interactSubmitted;
    const rate = state.total > 0 ? Math.round((submitted / state.total) * 100) : 0;
    const accuracy = submitted > 0 ? Math.round((state.interactCorrect / submitted) * 100) : '--';
    const accText = submitted > 0 ? accuracy + '%' : '--';
    const accSub = submitted > 0 ? (state.interactCorrect + '人答对 / ' + submitted + '人已答') : '等待作答数据';
    const typeBadge = state.interactQType === 'objective' ? '选择题' : '解答题';

    // Student chips
    let chips = '';
    for (let i = 0; i < state.total; i++) {
      const done = i < submitted;
      chips += `<div class="interact-student-chip ${done ? 'done' : ''}">${interactStudentNames[i] || '学生'}</div>`;
    }

    return `<div class="interact-panel">
      <div class="interact-panel-header">
        <div class="title-row">
          <h3>作答中</h3>
          <span class="type-badge">${typeBadge}</span>
        </div>
        <button class="bs-popup-close" onclick="interactEnd()">✕</button>
      </div>
      <div class="interact-stats-row">
        <div class="interact-stat-card">
          <div class="stat-label">已提交</div>
          <div class="stat-value blue">${submitted}<span class="unit"> / ${state.total}</span></div>
          <div class="stat-sub">提交率 ${rate}%</div>
        </div>
        <div class="interact-stat-card">
          <div class="stat-label">正确率</div>
          <div class="stat-value green">${accText}</div>
          <div class="stat-sub">${accSub}</div>
        </div>
      </div>
      <div class="interact-progress">
        <div class="prog-label"><span>提交进度</span><span>${rate}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${rate}%"></div></div>
      </div>
      <div class="interact-student-grid-section">
        <div class="section-title">学生作答状态</div>
        <div class="interact-student-grid">${chips}</div>
      </div>
      <div class="interact-panel-footer">
        <div class="hint">答案不在大屏显示，保护作答公平</div>
        <div class="btn-group">
          <button class="interact-detail-btn" onclick="interactShowDetail()">作答详情</button>
          <button class="interact-end-btn" onclick="interactEnd()">结束作答</button>
        </div>
      </div>
    </div>`;
  } else if (state.phase === 'detail') {
    // Answer detail overlay — vertical layout: question on top, student data below
    const submitted = state.interactSubmitted;
    const correctNum = state.interactCorrect;
    const wrongNum = submitted - correctNum;
    const pendingNum = state.total - submitted;
    const qType = state.interactQType;

    const qText = qType === 'objective'
      ? '已知 x²+5x+6=0，则 x 的值为？<br><br>A. x=-1 或 x=-6<br>B. x=-2 或 x=-3<br>C. x=2 或 x=3<br>D. x=1 或 x=6'
      : '如图，在△ABC中，AB=AC，D是BC的中点。<br><br>求证：AD⊥BC';

    let resultHtml = '';

    if (qType === 'objective') {
      // 客观题：按正确人数-名单，错误答案分组-人数-名单
      const correctNames = interactStudentNames.slice(0, correctNum).join('、');

      // 模拟错误答案分组
      const wrongGroups = [
        { answer: 'C', students: ['林雅琪','马天宇','罗思涵'] },
        { answer: 'A', students: ['宋雨桐','付博'] },
        { answer: 'D', students: ['邹琪'] }
      ];
      // Adjust counts to match wrongNum
      let wrongUsed = 0;
      let wrongGroupsHtml = '';
      for (const g of wrongGroups) {
        if (wrongUsed >= wrongNum) break;
        const count = Math.min(g.students.length, wrongNum - wrongUsed);
        const names = g.students.slice(0, count);
        wrongUsed += count;
        wrongGroupsHtml += `<div class="interact-wrong-subgroup">
          <div class="sub-title">
            <span class="ans-tag">${g.answer}</span>
            <span class="sub-count">${names.length}人</span>
          </div>
          <div class="name-list">${names.join('、')}</div>
        </div>`;
      }

      resultHtml = `<div class="interact-result-section">
        <div class="interact-result-group">
          <div class="group-title correct">回答正确 <span class="count">${correctNum}人</span></div>
          ${correctNum <= 10 ? `<div class="interact-name-list">${correctNames}</div>` : `<div class="interact-name-list">${interactStudentNames.slice(0, 8).join('、')}… 等${correctNum}人</div>`}
        </div>
        <div class="interact-result-group">
          <div class="group-title wrong">回答错误 <span class="count">${wrongNum}人</span></div>
          ${wrongGroupsHtml}
        </div>
        <div class="interact-result-group">
          <div class="group-title unanswered">未作答 <span class="count">${pendingNum}人</span></div>
        </div>
      </div>`;
    } else {
      // 主观题：按正误分类展示学生卡片（拍照作答缩略图）
      let correctCards = '';
      for (let i = 0; i < Math.min(correctNum, 8); i++) {
        correctCards += `<div class="interact-photo-card">
          <div class="thumb">手写作答</div>
          <div class="card-name">${interactStudentNames[i]}</div>
        </div>`;
      }
      let wrongCards = '';
      for (let i = 0; i < Math.min(wrongNum, 6); i++) {
        wrongCards += `<div class="interact-photo-card">
          <div class="thumb">手写作答</div>
          <div class="card-name">${interactStudentNames[correctNum + i]}</div>
        </div>`;
      }
      const ungradedNum = Math.min(2, pendingNum);
      const unansweredNum = Math.max(0, pendingNum - ungradedNum);

      resultHtml = `<div class="interact-result-section">
        <div class="interact-result-group">
          <div class="group-title correct">回答正确 <span class="count">${correctNum}人</span></div>
          <div class="interact-photo-grid">${correctCards}${correctNum > 8 ? `<div class="interact-photo-card" style="justify-content:center;"><div class="card-name" style="color:#888;">+${correctNum - 8}人</div></div>` : ''}</div>
        </div>
        <div class="interact-result-group">
          <div class="group-title wrong">回答错误 <span class="count">${wrongNum}人</span></div>
          <div class="interact-photo-grid">${wrongCards}</div>
        </div>
        <div class="interact-result-group">
          <div class="group-title ungraded">未批改 <span class="count">${ungradedNum}人</span></div>
        </div>
        <div class="interact-result-group">
          <div class="group-title unanswered">未作答 <span class="count">${unansweredNum}人</span></div>
        </div>
      </div>`;
    }

    return `<div class="interact-detail-overlay">
      <div class="interact-panel-header">
        <div class="title-row"><h3>作答详情</h3></div>
        <button style="padding:4px 10px;border-radius:4px;background:rgba(255,255,255,0.08);border:none;color:#aaa;font-size:10px;cursor:pointer;" onclick="interactBackToPanel()">← 返回</button>
      </div>
      <div class="interact-detail-body">
        <div class="interact-detail-qbox">${qText}</div>
        ${resultHtml}
      </div>
    </div>`;
  }
  return '';
}

function renderTeacherInteract(content) {
  if (state.phase === 'active' || state.phase === 'result') {
    const submitted = state.interactSubmitted;
    const accuracy = submitted > 0 ? Math.round((state.interactCorrect / submitted) * 100) + '%' : '--';
    content.innerHTML = `<div class="teacher-control-panel fade-in" style="padding:10px 14px;gap:8px;align-items:stretch;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="panel-title" style="margin:0;">互动题 · 作答监控</div>
        <span style="font-size:10px;color:#888;">进行中</span>
      </div>
      <div style="display:flex;gap:8px;">
        <div style="flex:1;background:#f8f9fa;border-radius:8px;padding:8px;text-align:center;">
          <div style="font-size:18px;font-weight:700;color:#333;">${submitted}</div>
          <div style="font-size:9px;color:#999;">已提交</div>
        </div>
        <div style="flex:1;background:#f8f9fa;border-radius:8px;padding:8px;text-align:center;">
          <div style="font-size:18px;font-weight:700;color:#333;">${state.total}</div>
          <div style="font-size:9px;color:#999;">总人数</div>
        </div>
        <div style="flex:1;background:#f8f9fa;border-radius:8px;padding:8px;text-align:center;">
          <div style="font-size:18px;font-weight:700;color:#66bb6a;">${accuracy}</div>
          <div style="font-size:9px;color:#999;">正确率</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="ctrl-btn primary" style="flex:1;" onclick="interactShowDetail()">作答详情</button>
        <button class="ctrl-btn danger" style="flex:1;" onclick="interactEnd()">结束作答</button>
      </div>
    </div>`;
  } else if (state.phase === 'detail') {
    const correctNum = state.interactCorrect;
    const wrongNum = state.interactSubmitted - correctNum;
    const pendingNum = state.total - state.interactSubmitted;
    const ansText = state.interactQType === 'objective' ? 'B. x=-2 或 x=-3' : '见大屏解析';

    let wrongDetail = '';
    if (state.interactQType === 'objective') {
      wrongDetail = `<div style="font-size:10px;color:#888;margin-top:4px;text-align:left;">
        <span style="color:#ef5350;font-weight:500;">C</span> 3人 · <span style="color:#ef5350;font-weight:500;">A</span> 2人 · <span style="color:#ef5350;font-weight:500;">D</span> 1人
      </div>`;
    }

    content.innerHTML = `<div class="teacher-control-panel fade-in" style="padding:10px 14px;gap:6px;align-items:stretch;">
      <div class="panel-title" style="text-align:center;">作答详情</div>
      <div style="background:#f8f9fa;border-radius:6px;padding:8px;text-align:left;">
        <div style="font-size:9px;color:#999;">正确答案</div>
        <div style="font-size:12px;font-weight:600;color:#2e7d32;margin-top:2px;">${ansText}</div>
      </div>
      <div style="text-align:left;padding:2px 0;">
        <div style="font-size:11px;color:#66bb6a;font-weight:600;">回答正确 <span style="font-weight:400;color:#aaa;">${correctNum}人</span></div>
      </div>
      <div style="text-align:left;padding:2px 0;">
        <div style="font-size:11px;color:#ef5350;font-weight:600;">回答错误 <span style="font-weight:400;color:#aaa;">${wrongNum}人</span></div>
        ${wrongDetail}
      </div>
      <div style="text-align:left;padding:2px 0;">
        <div style="font-size:11px;color:#888;">未作答 <span style="font-weight:400;color:#aaa;">${pendingNum}人</span></div>
      </div>
      <button class="ctrl-btn danger" style="width:100%;margin-top:4px;" onclick="interactEnd()">结束互动</button>
    </div>`;
  }
}

function renderStudentInteract(content) {
  if (state.phase === 'active' || state.phase === 'result') {
    if (state.interactStudentDone) {
      if (state.interactQType === 'subjective' && state.phase === 'detail') {
        // Self-check for subjective
        content.innerHTML = `<div class="student-content fade-in" style="padding:12px;align-items:stretch;">
          <div style="font-size:12px;font-weight:600;color:#333;margin-bottom:6px;">老师已公布答案，请自批</div>
          <div style="background:#f1f8e9;border:1px solid #c5e1a5;border-radius:8px;padding:8px;text-align:left;">
            <div style="font-size:9px;font-weight:600;color:#558b2f;">参考答案</div>
            <div style="font-size:10px;color:#33691e;line-height:1.5;margin-top:3px;">△ABD≌△ACD（SSS）<br>∴ ∠ADB=∠ADC=90°<br>∴ AD⊥BC</div>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="ctrl-btn success" style="flex:1;">我做对了 ✓</button>
            <button class="ctrl-btn danger" style="flex:1;">我做错了 ✗</button>
          </div>
        </div>`;
      } else {
        content.innerHTML = `<div class="student-content fade-in">
          <div style="width:44px;height:44px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px;">✓</div>
          <div style="font-size:14px;font-weight:600;color:#333;">已提交</div>
          <div style="font-size:11px;color:#999;margin-top:4px;">等待老师公布答案</div>
        </div>`;
      }
    } else {
      if (state.interactQType === 'objective') {
        // Choice question
        const selections = state.studentSelections || [];
        const optData = [
          { letter: 'A', text: 'x=-1 或 x=-6' },
          { letter: 'B', text: 'x=-2 或 x=-3' },
          { letter: 'C', text: 'x=2 或 x=3' },
          { letter: 'D', text: 'x=1 或 x=6' }
        ];
        const opts = optData.map(o => {
          const sel = selections.includes(o.letter) ? 'selected' : '';
          return `<div class="interact-opt-item ${sel}" onclick="interactSelectOpt('${o.letter}')">
            <span class="letter">${o.letter}</span>
            <span>${o.text}</span>
          </div>`;
        }).join('');
        const canSubmit = selections.length > 0 ? '' : 'disabled';
        content.innerHTML = `<div class="student-content fade-in" style="padding:12px;align-items:stretch;">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
            <span style="background:#1976d2;color:#fff;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;">互动题</span>
            <span style="font-size:10px;color:#999;">选择题·单选</span>
          </div>
          <div style="font-size:12px;color:#333;line-height:1.5;margin-bottom:10px;text-align:left;">已知 x²+5x+6=0，则 x 的值为？</div>
          <div class="interact-student-options">${opts}</div>
          <button class="student-submit-btn" onclick="interactStudentSubmit()" ${canSubmit} style="margin-top:10px;">提交答案</button>
        </div>`;
      } else {
        // Subjective: photo upload
        content.innerHTML = `<div class="student-content fade-in" style="padding:12px;align-items:stretch;">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
            <span style="background:#1976d2;color:#fff;font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;">互动题</span>
            <span style="font-size:10px;color:#999;">解答题</span>
          </div>
          <div style="font-size:11px;color:#333;line-height:1.5;margin-bottom:10px;text-align:left;">如图，在△ABC中，AB=AC，D是BC的中点。求证：AD⊥BC。</div>
          <div onclick="interactStudentSubmit()" style="width:100%;padding:16px;border:2px dashed #bdbdbd;border-radius:8px;text-align:center;color:#999;font-size:11px;cursor:pointer;">
            <div style="font-size:24px;margin-bottom:4px;">📷</div>
            <div>拍照上传你的解答</div>
          </div>
        </div>`;
      }
    }
  } else if (state.phase === 'detail') {
    // Student sees self-check if subjective, or result if objective
    if (state.interactQType === 'subjective') {
      content.innerHTML = `<div class="student-content fade-in" style="padding:12px;align-items:stretch;">
        <div style="font-size:12px;font-weight:600;color:#333;margin-bottom:6px;">老师已公布答案，请自批</div>
        <div style="background:#f1f8e9;border:1px solid #c5e1a5;border-radius:8px;padding:8px;text-align:left;">
          <div style="font-size:9px;font-weight:600;color:#558b2f;">参考答案</div>
          <div style="font-size:10px;color:#33691e;line-height:1.5;margin-top:3px;">△ABD≌△ACD（SSS）<br>∴ ∠ADB=∠ADC=90°<br>∴ AD⊥BC</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="ctrl-btn success" style="flex:1;">我做对了 ✓</button>
          <button class="ctrl-btn danger" style="flex:1;">我做错了 ✗</button>
        </div>
      </div>`;
    } else {
      content.innerHTML = `<div class="student-content fade-in">
        <div style="width:44px;height:44px;border-radius:50%;background:#e8f5e9;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px;">✓</div>
        <div style="font-size:14px;font-weight:600;color:#333;">已提交</div>
        <div style="font-size:11px;color:#999;margin-top:4px;">老师正在查看详情</div>
      </div>`;
    }
  }
}

function interactSelectOpt(letter) {
  state.studentSelections = [letter];
  renderStudent();
}

// ======= Helpers =======
function formatTime(s) {
  if (s <= 0) return '0:00';
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function endTimer() {
  clearIntervals();
  state.timer = 0;
  if (state.scene === 'choice') state.answered = state.total;
  else if (state.scene === 'interact') { state.interactSubmitted = state.total; state.interactCorrect = Math.round(state.total * 0.7); }
  else if (state.scene === 'quiz') state.quizSubmitted = state.total;
  else state.photosReceived = state.total;
  state.phase = 'result';
  render();
}

function updateTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.textContent.includes(getSceneName())) {
      btn.classList.add('active');
    }
  });
}

// ======= Init =======
render();
</script>
</body>
</html>
