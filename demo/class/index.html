<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧课堂 - 交互Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; min-height: 100vh; padding: 60px 20px; }
.container { max-width: 800px; margin: 0 auto; }
.breadcrumb { font-size: 13px; color: #999; margin-bottom: 20px; }
.breadcrumb a { color: #00BCD4; text-decoration: none; }
h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 32px; }
.demo-list { list-style: none; }
.demo-list li { background: #fff; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.demo-list a { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; color: #333; text-decoration: none; border-radius: 10px; transition: all 0.2s; }
.demo-list a:hover { background: #f0fafa; color: #00BCD4; }
.arrow { color: #ccc; font-size: 18px; transition: all 0.2s; }
.demo-list a:hover .arrow { color: #00BCD4; transform: translateX(4px); }
.demo-desc { font-size: 12px; color: #999; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="breadcrumb"><a href="../">← 返回总目录</a></div>
  <h1>智慧课堂 Demo</h1>
  <ul class="demo-list">
    <li>
      <a href="qiangda/">
        <div>
          <div>抢答功能</div>
          <div class="demo-desc">课堂抢答交互演示</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
